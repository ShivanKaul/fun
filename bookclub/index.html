<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Book Club Picks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f7f0e4;
      --ink: #201b16;
      --muted: #6f6258;
      --card: #fffaf1;
      --line: rgba(32, 27, 22, 0.14);
      --shadow: 0 24px 80px rgba(58, 42, 28, 0.16);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background:
        radial-gradient(circle at top left, rgba(138, 75, 54, 0.14), transparent 36rem),
        radial-gradient(circle at top right, rgba(71, 108, 120, 0.13), transparent 36rem),
        var(--bg);
      color: var(--ink);
      font-family: "Inter", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    a { color: inherit; }

    .shell {
      width: min(1160px, calc(100% - 32px));
      margin: 0 auto;
      padding: 56px 0 72px;
    }

    header {
      display: grid;
      grid-template-columns: minmax(0, 1.25fr) minmax(260px, 0.75fr);
      gap: 32px;
      align-items: end;
      margin-bottom: 34px;
    }

    .eyebrow {
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-size: 0.78rem;
      font-weight: 800;
      margin-bottom: 14px;
    }

    h1 {
      font-family: "Fraunces", Georgia, "Times New Roman", serif;
      font-optical-sizing: auto;
      font-weight: 600;
      font-size: clamp(2.7rem, 7vw, 5.8rem);
      line-height: 0.95;
      margin: 0;
      max-width: 880px;
      letter-spacing: -0.03em;
    }

    .intro {
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.6;
      margin: 0;
      max-width: 32rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 18px;
      align-items: stretch;
    }

    .book-card {
      position: relative;
      border: 1px solid var(--line);
      background: color-mix(in srgb, var(--card) 92%, white);
      border-radius: 26px;
      box-shadow: var(--shadow);
      overflow: hidden;
      min-height: 100%;
      display: flex;
      flex-direction: column;
      isolation: isolate;
    }

    .book-card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto;
      height: 7px;
      background: var(--accent);
      z-index: 2;
    }

    .cover-wrap {
      aspect-ratio: 3 / 4;
      background: linear-gradient(135deg, rgba(0,0,0,0.05), rgba(255,255,255,0.45));
      display: grid;
      place-items: center;
      padding: 22px 22px 12px;
    }

    .cover-link { display: contents; }

    .cover-link .cover {
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .cover-link:hover .cover {
      transform: rotate(-1deg) scale(1.03);
      box-shadow: 0 22px 46px rgba(0,0,0,0.3);
    }

    .cover {
      width: min(78%, 220px);
      height: 100%;
      max-height: 300px;
      object-fit: cover;
      border-radius: 10px;
      box-shadow: 0 18px 38px rgba(0,0,0,0.24);
      transform: rotate(-1deg);
      background: #ddd;
    }

    .content {
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      flex: 1;
    }

    .title-row h2 {
      font-family: "Fraunces", Georgia, "Times New Roman", serif;
      font-optical-sizing: auto;
      font-weight: 600;
      font-size: 1.5rem;
      line-height: 1.08;
      margin: 0 0 6px;
      letter-spacing: -0.015em;
    }

    .author {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .author a {
      color: inherit;
      text-decoration: underline;
      text-decoration-color: color-mix(in srgb, var(--accent) 45%, transparent);
      text-underline-offset: 2px;
    }

    .author a:hover {
      color: color-mix(in srgb, var(--accent) 72%, black);
      text-decoration-color: var(--accent);
    }

    .tags {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
    }

    .tag {
      border: 1px solid color-mix(in srgb, var(--accent) 44%, transparent);
      color: color-mix(in srgb, var(--accent) 70%, black);
      background: color-mix(in srgb, var(--accent) 9%, white);
      padding: 6px 9px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 750;
      white-space: nowrap;
    }

    .sell {
      font-size: 1rem;
      line-height: 1.48;
      margin: 0;
      font-weight: 650;
    }

    .meta {
      display: grid;
      gap: 10px;
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.45;
    }

    .meta b { color: var(--ink); }

    .quote {
      margin: 0;
      padding: 12px 14px;
      border-left: 3px solid color-mix(in srgb, var(--accent) 60%, transparent);
      background: color-mix(in srgb, var(--accent) 7%, white);
      border-radius: 0 12px 12px 0;
      font-style: italic;
      font-size: 0.95rem;
      line-height: 1.5;
      color: var(--ink);
    }

    .quote cite {
      display: block;
      margin-top: 8px;
      font-style: normal;
      font-weight: 700;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .card-foot {
      margin-top: auto;
      display: grid;
      gap: 14px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
    }

    .library {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-decoration: none;
      background: var(--accent);
      color: #fff;
      font-weight: 800;
      font-size: 0.86rem;
      padding: 11px 14px;
      border-radius: 12px;
      transition: filter 0.15s ease;
    }

    .library:hover { filter: brightness(1.08); }

    .section-label {
      font-size: 0.7rem;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      font-weight: 800;
      color: var(--muted);
      margin-bottom: 9px;
    }

    .review-links {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .review-links a {
      text-decoration: none;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 10px;
      background: rgba(255,255,255,0.48);
      font-size: 0.82rem;
      font-weight: 800;
    }

    .review-links a:hover {
      border-color: color-mix(in srgb, var(--accent) 58%, transparent);
      color: color-mix(in srgb, var(--accent) 72%, black);
    }

    .footer-note {
      margin-top: 28px;
      color: var(--muted);
      font-size: 0.92rem;
      text-align: center;
    }

    @media (max-width: 1000px) {
      .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      header { grid-template-columns: 1fr; }
      .intro { max-width: 45rem; }
    }

    @media (max-width: 620px) {
      .shell { width: min(100% - 22px, 1160px); padding-top: 34px; }
      .grid { grid-template-columns: 1fr; }
      .book-card { border-radius: 22px; }
      .cover-wrap { aspect-ratio: 16 / 11; }
      .cover { width: min(46%, 170px); }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header>
      <div>
        <div class="eyebrow"></div>
        <h1></h1>
      </div>
      <p class="intro"></p>
    </header>

    <section class="grid" aria-label="Book options"></section>

    <p class="footer-note"></p>
  </main>

  <script>
    function esc(s) {
      return String(s).replace(/[&<>"']/g, function (c) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
      });
    }

    function linkify(s) {
      var re = /\[([^\]]+)\]\((https?:\/\/[^\s]+?)\)(?=$|[\s,.;:])/g;
      var out = '';
      var last = 0;
      var m;
      while ((m = re.exec(s)) !== null) {
        out += esc(s.slice(last, m.index));
        out += '<a href="' + esc(m[2]) + '" target="_blank" rel="noopener">' + esc(m[1]) + '</a>';
        last = m.index + m[0].length;
      }
      out += esc(s.slice(last));
      return out;
    }

    function parseBooks(text) {
      var page = {};
      var books = [];
      var current = null;
      var lines = text.split(/\r?\n/);

      for (var i = 0; i < lines.length; i++) {
        var line = lines[i];
        var trimmed = line.trim();
        if (!trimmed || trimmed.charAt(0) === '#' && trimmed.indexOf('## ') !== 0) { continue; }

        if (trimmed.indexOf('## ') === 0) {
          current = { title: trimmed.slice(3).trim(), tags: [], links: [] };
          books.push(current);
          continue;
        }

        var body = trimmed.charAt(0) === '-' ? trimmed.slice(1).trim() : trimmed;
        var idx = body.indexOf(':');
        if (idx === -1) { continue; }
        var key = body.slice(0, idx).trim().toLowerCase();
        var value = body.slice(idx + 1).trim();

        if (!current) {
          page[key] = value;
          continue;
        }

        if (key === 'tags') {
          current.tags = value.split(',').map(function (t) { return t.trim(); }).filter(Boolean);
        } else if (key === 'link') {
          var parts = value.split('|');
          current.links.push({ label: parts[0].trim(), url: (parts[1] || '').trim() });
        } else if (key === 'quote') {
          if (value) {
            var q = value.split('|');
            current.quote = { text: q[0].trim(), cite: (q[1] || '').trim() };
          }
        } else {
          current[key] = value;
        }
      }

      return { page: page, books: books };
    }

    function renderCard(book) {
      var tags = book.tags.map(function (t) {
        return '<span class="tag">' + esc(t) + '</span>';
      }).join('');

      var links = book.links.map(function (l) {
        return '<a href="' + esc(l.url) + '" target="_blank" rel="noopener">' + esc(l.label) + '</a>';
      }).join('');

      var meta = '';
      if (book['why pick']) { meta += '<div><b>Why pick:</b> ' + esc(book['why pick']) + '</div>'; }
      if (book['why not pick']) { meta += '<div><b>Why not pick:</b> ' + esc(book['why not pick']) + '</div>'; }

      var quote = '';
      if (book.quote) {
        quote = '<blockquote class="quote">' + esc(book.quote.text) +
          (book.quote.cite ? '<cite>' + esc(book.quote.cite) + '</cite>' : '') +
          '</blockquote>';
      }

      var library = book.library
        ? '<a class="library" href="' + esc(book.library) + '" target="_blank" rel="noopener">Find it at SF Public Library</a>'
        : '';
      var reviews = links
        ? '<div><div class="section-label">Reviews</div><div class="review-links">' + links + '</div></div>'
        : '';
      var foot = (library || reviews) ? '<div class="card-foot">' + library + reviews + '</div>' : '';

      var cover = '<img class="cover" alt="' + esc(book.title) + ' book cover" src="' + esc(book.cover || '') + '" />';
      if (book.wikipedia) {
        cover = '<a class="cover-link" href="' + esc(book.wikipedia) + '" target="_blank" rel="noopener" aria-label="Open Wikipedia entry for ' + esc(book.title) + '">' + cover + '</a>';
      }

      return (
        '<article class="book-card" style="--accent: ' + esc(book.accent || '#6f6258') + '">' +
          '<div class="cover-wrap">' + cover + '</div>' +
          '<div class="content">' +
            '<div class="title-row">' +
              '<h2>' + esc(book.title) + '</h2>' +
              '<div class="author">' + linkify(book.author || '') + '</div>' +
            '</div>' +
            (tags ? '<div class="tags">' + tags + '</div>' : '') +
            (book.sell ? '<p class="sell">' + esc(book.sell) + '</p>' : '') +
            quote +
            (meta ? '<div class="meta">' + meta + '</div>' : '') +
            foot +
          '</div>' +
        '</article>'
      );
    }

    function render(data) {
      var page = data.page;
      if (page.eyebrow) { document.querySelector('.eyebrow').textContent = page.eyebrow; }
      if (page.title) { document.querySelector('h1').textContent = page.title; }
      if (page.intro) { document.querySelector('.intro').textContent = page.intro; }
      if (page.footer) { document.querySelector('.footer-note').textContent = page.footer; }
      if (page.title) { document.title = page.title; }

      document.querySelector('.grid').innerHTML = data.books.map(renderCard).join('');
    }

    fetch('books.md', { cache: 'no-cache' })
      .then(function (r) {
        if (!r.ok) { throw new Error('Could not load books.md (' + r.status + ')'); }
        return r.text();
      })
      .then(function (text) { render(parseBooks(text)); })
      .catch(function (err) {
        document.querySelector('.grid').innerHTML = '<p class="sell">' + esc(err.message) + '</p>';
      });
  </script>
</body>
</html>
